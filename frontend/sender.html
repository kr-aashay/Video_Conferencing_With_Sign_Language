<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HexaMinds — Sender Dashboard</title>

  <!-- ── MediaPipe Holistic (CDN) ─────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675471629/holistic.js"
          crossorigin="anonymous"></script>

  <!-- ── ZegoCloud Web SDK removed ──────────────────────────────────────── -->

  <style>
    /* ══════════════════════════════════════════════════════════════════════════
       Design tokens
    ══════════════════════════════════════════════════════════════════════════ */
    :root {
      --glass-bg:      rgba(12, 14, 22, 0.72);
      --glass-border:  rgba(255, 255, 255, 0.10);
      --glass-blur:    18px;
      --accent:        #00e6ff;
      --accent-dim:    rgba(0, 230, 255, 0.18);
      --success:       #00ff9d;
      --warning:       #ffcc00;
      --danger:        #ff4d6d;
      --text-primary:  rgba(255, 255, 255, 0.92);
      --text-secondary:rgba(255, 255, 255, 0.50);
      --radius-lg:     16px;
      --radius-md:     10px;
      --radius-sm:     6px;
      --font:          'Inter', system-ui, sans-serif;
    }

    /* ── Reset ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: radial-gradient(ellipse at 20% 30%, #0d1b2a 0%, #060810 100%);
      min-height: 100dvh;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Layout ─────────────────────────────────────────────────────────────── */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr auto;
      grid-template-areas:
        "header  header"
        "video   sidebar"
        "caption caption";
      gap: 16px;
      padding: 16px;
      height: 100dvh;
    }

    /* ── Glassmorphism card ──────────────────────────────────────────────────── */
    .glass {
      background:    var(--glass-bg);
      border:        1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-radius: var(--radius-lg);
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    /* ── Status pill ────────────────────────────────────────────────────────── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }
    .status-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .status-pill.connecting { border-color: var(--warning); color: var(--warning); }
    .status-pill.connecting .dot { background: var(--warning); animation: pulse 1s infinite; }
    .status-pill.open       { border-color: var(--success);  color: var(--success); }
    .status-pill.open .dot  { background: var(--success); }
    .status-pill.closed,
    .status-pill.error      { border-color: var(--danger);   color: var(--danger); }
    .status-pill.closed .dot,
    .status-pill.error .dot { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Video area ─────────────────────────────────────────────────────────── */
    .video-area {
      grid-area: video;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #video-feed {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: var(--radius-lg);
      display: block;
      transform: scaleX(-1);   /* mirror for signer */
    }

    /* Skeleton overlay — exact same size as video */
    #skeleton-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border-radius: var(--radius-lg);
      pointer-events: none;
      transform: scaleX(-1);   /* mirror to match video */
    }

    /* FPS badge */
    .fps-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 3px 8px;
      font-size: 0.7rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      backdrop-filter: blur(6px);
    }

    /* Latency badge */
    .latency-badge {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 3px 8px;
      font-size: 0.7rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      backdrop-filter: blur(6px);
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar h3 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    /* Gloss chips */
    .gloss-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 36px;
    }

    .gloss-chip {
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--accent-dim);
      border: 1px solid rgba(0, 230, 255, 0.35);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
      animation: chipIn 0.2s ease;
    }

    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      padding: 10px 12px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
    }

    .stat-card .label {
      font-size: 0.65rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-card .value {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      margin-top: 2px;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-align: center;
    }

    .btn:hover { background: rgba(255,255,255,0.12); }

    .btn.primary {
      background: var(--accent-dim);
      border-color: rgba(0, 230, 255, 0.4);
      color: var(--accent);
    }

    .btn.primary:hover { background: rgba(0, 230, 255, 0.28); }

    .btn.danger {
      background: rgba(255, 77, 109, 0.12);
      border-color: rgba(255, 77, 109, 0.35);
      color: var(--danger);
    }

    .btn.danger:hover { background: rgba(255, 77, 109, 0.22); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Skeleton toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .toggle {
      position: relative;
      width: 36px; height: 20px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* ── Caption bar ─────────────────────────────────────────────────────────── */
    .caption-bar {
      grid-area: caption;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 60px;
    }

    .caption-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    #caption-text {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
      transition: opacity 0.3s;
    }

    #caption-text.flash {
      animation: captionFlash 0.4s ease;
    }

    @keyframes captionFlash {
      0%   { color: var(--accent); }
      100% { color: var(--text-primary); }
    }

    /* ── Scrollbar ───────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  </style>
</head>

<body>
<div class="dashboard">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="glass header">
    <div class="logo">
      <div class="logo-dot"></div>
      HexaMinds
      <span style="color:var(--text-secondary);font-weight:400;font-size:0.85rem">
        / Sender Dashboard
      </span>
    </div>
    <div class="header-meta">
      <span id="room-label" style="color:var(--text-secondary)">Room: —</span>
      <span id="ws-status" class="status-pill closed">
        <span class="dot"></span>
        <span class="label-text">Disconnected</span>
      </span>
    </div>
  </header>

  <!-- ── Video ───────────────────────────────────────────────────────────── -->
  <section class="glass video-area">
    <video id="video-feed" autoplay playsinline muted></video>
    <canvas id="skeleton-canvas"></canvas>
    <div class="fps-badge" id="fps-badge">— FPS</div>
    <div class="latency-badge" id="latency-badge">— ms</div>
  </section>

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="glass sidebar">

    <div>
      <h3>Detected Glosses</h3>
      <div class="gloss-list" id="gloss-list">
        <span style="color:var(--text-secondary);font-size:0.78rem">Waiting…</span>
      </div>
    </div>

    <div>
      <h3>Session Stats</h3>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Frames</div>
          <div class="value" id="stat-frames">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Captions</div>
          <div class="value" id="stat-captions">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Avg Latency</div>
          <div class="value" id="stat-latency">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Dropped</div>
          <div class="value" id="stat-dropped">0</div>
        </div>
      </div>
    </div>

    <div>
      <h3>Overlay</h3>
      <div class="toggle-row">
        <span>Ghost Skeleton</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-skeleton" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row" style="margin-top:8px">
        <span>Alignment Grid</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-grid" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="controls">
      <h3>Controls</h3>
      <button class="btn primary" id="btn-start">Start Session</button>
      <button class="btn" id="btn-reset" disabled>Reset Buffer</button>
      <button class="btn danger" id="btn-stop" disabled>End Session</button>
    </div>

  </aside>

  <!-- ── Caption bar ─────────────────────────────────────────────────────── -->
  <footer class="glass caption-bar">
    <span class="caption-label">Caption</span>
    <span id="caption-text">—</span>
  </footer>

</div>

<!-- ── Application script ──────────────────────────────────────────────────── -->
<script type="module">
  import { HolisticBridge }   from './sdk/holistic-bridge.js';
  import { SkeletonRenderer } from './sdk/skeleton-renderer.js';

  // ══════════════════════════════════════════════════════════════════════════
  // CONFIG — injected at runtime (never hardcode credentials here)
  // In production, fetch these from your backend token endpoint.
  // ══════════════════════════════════════════════════════════════════════════
  const CONFIG = {
    // Session
    roomId:        'sign_detection',
    userId:        `user_${Math.random().toString(36).slice(2, 8)}`,
    targetUserId:  'receiver_001',

    // FastAPI WebSocket
    apiHost:       window.location.hostname === 'localhost'
                     ? 'ws://localhost:8000'
                     : `wss://${window.location.hostname}`,
  };

  // ══════════════════════════════════════════════════════════════════════════
  // DOM refs
  // ══════════════════════════════════════════════════════════════════════════
  const videoEl        = document.getElementById('video-feed');
  const skeletonCanvas = document.getElementById('skeleton-canvas');
  const fpsBadge       = document.getElementById('fps-badge');
  const latencyBadge   = document.getElementById('latency-badge');
  const wsStatusEl     = document.getElementById('ws-status');
  const roomLabel      = document.getElementById('room-label');
  const glossList      = document.getElementById('gloss-list');
  const captionText    = document.getElementById('caption-text');
  const statFrames     = document.getElementById('stat-frames');
  const statCaptions   = document.getElementById('stat-captions');
  const statLatency    = document.getElementById('stat-latency');
  const statDropped    = document.getElementById('stat-dropped');
  const btnStart       = document.getElementById('btn-start');
  const btnReset       = document.getElementById('btn-reset');
  const btnStop        = document.getElementById('btn-stop');
  const toggleSkeleton = document.getElementById('toggle-skeleton');
  const toggleGrid     = document.getElementById('toggle-grid');

  // ══════════════════════════════════════════════════════════════════════════
  // State
  // ══════════════════════════════════════════════════════════════════════════
  let bridge   = null;
  let renderer = null;
  let captionCount  = 0;
  let latencySum    = 0;
  let fpsFrames     = 0;
  let fpsLastTs     = performance.now();

  // ══════════════════════════════════════════════════════════════════════════
  // Helpers
  // ══════════════════════════════════════════════════════════════════════════

  function setWsStatus(status) {
    const labels = {
      connecting: 'Connecting…',
      open:       'AI Connected',
      closed:     'Disconnected',
      error:      'Error',
    };
    wsStatusEl.className = `status-pill ${status}`;
    wsStatusEl.querySelector('.label-text').textContent = labels[status] ?? status;
  }

  function syncCanvasSize() {
    const rect = skeletonCanvas.parentElement.getBoundingClientRect();
    skeletonCanvas.width  = rect.width;
    skeletonCanvas.height = rect.height;
  }

  function updateFps() {
    fpsFrames++;
    const now = performance.now();
    const dt  = now - fpsLastTs;
    if (dt >= 1000) {
      fpsBadge.textContent = `${Math.round(fpsFrames * 1000 / dt)} FPS`;
      fpsFrames  = 0;
      fpsLastTs  = now;
    }
  }

  function renderGlosses(glosses) {
    glossList.innerHTML = '';
    glosses.forEach(g => {
      const chip = document.createElement('span');
      chip.className   = 'gloss-chip';
      chip.textContent = g;
      glossList.appendChild(chip);
    });
  }

  // ══════════════════════════════════════════════════════════════════════════
  // Session lifecycle
  // ══════════════════════════════════════════════════════════════════════════

  async function startSession() {
    btnStart.disabled = true;
    btnReset.disabled = false;
    btnStop.disabled  = false;
    roomLabel.textContent = `Room: ${CONFIG.roomId}`;

    syncCanvasSize();
    window.addEventListener('resize', syncCanvasSize);

    // ── Skeleton renderer ──────────────────────────────────────────────────
    renderer = new SkeletonRenderer(skeletonCanvas, {
      showGrid: toggleGrid.checked,
      showFace: true,
    });

    // ── HolisticBridge ─────────────────────────────────────────────────────
    const wsUrl = `${CONFIG.apiHost}/ws/stream/${CONFIG.roomId}/${CONFIG.userId}/${CONFIG.targetUserId}`;

    bridge = new HolisticBridge({
      wsUrl,
      onCaption: ({ glosses, caption, latency_ms }) => {
        captionCount++;
        latencySum += latency_ms;

        renderGlosses(glosses);

        captionText.textContent = caption;
        captionText.classList.remove('flash');
        void captionText.offsetWidth;   // force reflow to restart animation
        captionText.classList.add('flash');

        latencyBadge.textContent = `${Math.round(latency_ms)} ms`;
        statCaptions.textContent = captionCount;
        statLatency.textContent  = `${Math.round(latencySum / captionCount)} ms`;
      },
      onSkeleton: (results) => {
        updateFps();
        if (toggleSkeleton.checked && renderer) {
          renderer.draw(results);
        } else if (renderer) {
          renderer.clear();
        }
        // Update frame counter
        const s = bridge?.stats();
        if (s) {
          statFrames.textContent  = s.frameCount;
          statDropped.textContent = s.droppedFrames;
        }
      },
      onStatus: setWsStatus,
    });

    const liveVideo = await bridge.start();

    // Attach live video to the visible <video> element
    videoEl.srcObject = liveVideo.srcObject;
    await videoEl.play();
    // Video conferencing will be handled by the new conferencing module
  }

  async function stopSession() {
    btnStart.disabled = false;
    btnReset.disabled = true;
    btnStop.disabled  = true;

    bridge?.stop();
    bridge = null;

    renderer?.clear();
    renderer = null;

    videoEl.srcObject = null;
    glossList.innerHTML = '<span style="color:var(--text-secondary);font-size:0.78rem">Waiting…</span>';
    captionText.textContent = '—';
    fpsBadge.textContent    = '— FPS';
    latencyBadge.textContent = '— ms';
    setWsStatus('closed');
    window.removeEventListener('resize', syncCanvasSize);
  }

  // ══════════════════════════════════════════════════════════════════════════
  // Toggle handlers
  // ══════════════════════════════════════════════════════════════════════════

  toggleGrid.addEventListener('change', () => {
    if (renderer) renderer._showGrid = toggleGrid.checked;
  });

  toggleSkeleton.addEventListener('change', () => {
    if (!toggleSkeleton.checked && renderer) renderer.clear();
  });

  // ══════════════════════════════════════════════════════════════════════════
  // Button handlers
  // ══════════════════════════════════════════════════════════════════════════

  btnStart.addEventListener('click', () => {
    startSession().catch(err => {
      console.error('[Dashboard] Start failed:', err);
      alert(`Failed to start session:\n${err.message}`);
      btnStart.disabled = false;
    });
  });

  btnReset.addEventListener('click', () => {
    bridge?.reset();
    glossList.innerHTML = '<span style="color:var(--text-secondary);font-size:0.78rem">Buffer reset…</span>';
  });

  btnStop.addEventListener('click', () => stopSession());
</script>
</body>
</html>
