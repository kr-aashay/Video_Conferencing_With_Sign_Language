<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aashay's Sign Lang — Live Caption</title>
  <link rel="stylesheet" href="./receiver.css" />
</head>

<body>
<div class="receiver-root">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">
        <div class="logo-pulse"></div>
        Aashay's Sign Lang
      </div>
      <div class="topbar-divider"></div>
      <span class="page-label">Live Caption — Receiver</span>
    </div>
    <div class="topbar-right">
      <span class="pill idle" id="pill-ai">
        <span class="pip"></span>
        <span id="pill-ai-text">AI Bridge</span>
      </span>
      <span class="pill idle" id="pill-room">
        <span class="pip"></span>
        <span id="pill-room-text">No Room</span>
      </span>
      <span class="pill idle" id="pill-stream">
        <span class="pip"></span>
        <span id="pill-stream-text">Stream Off</span>
      </span>
    </div>
  </header>

  <!-- VIDEO STAGE -->
  <main class="stage" id="stage">
    <video id="remote-video" autoplay playsinline></video>

    <!-- Waiting overlay -->
    <div class="waiting-overlay" id="waiting-overlay">
      <div class="grid-loader" aria-hidden="true">
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div>
      </div>
      <p class="waiting-label" id="waiting-label">Waiting for signer</p>
      <p class="waiting-sub"   id="waiting-sub">Join the call to begin</p>
    </div>

    <!-- Reconnecting banner -->
    <div class="reconnect-banner" id="reconnect-banner" role="status">
      Reconnecting...
    </div>

    <!-- Latency chip (top-right) — green/yellow/red -->
    <div class="latency-chip" id="latency-chip" aria-live="polite" title="AI translation latency">
      -- ms
    </div>

    <!-- Caption overlay (lower-third) — teleprompter style -->
    <div class="caption-overlay" role="region" aria-label="Live captions" aria-live="polite">
      <div class="caption-tray idle" id="caption-tray">
        <div class="caption-shimmer" aria-hidden="true"></div>
        <!-- Caption lines injected by JS, newest at bottom -->
        <div class="gloss-row empty" id="gloss-row"></div>
      </div>
    </div>
  </main>

</div>

<script>
'use strict';

/* ── Config ─────────────────────────────────────────────────────────────── */
const CFG = {
  wsUrl:          `ws://${location.hostname}:8000/ws/stream/sign_room/receiver_001/sender_001`,
  healthUrl:      `http://${location.hostname}:8000/health/detail`,
  captionTimeout: 6000,    // ms — clear captions after silence
  maxLines:       3,       // teleprompter history depth
  healthInterval: 6000,    // ms — AI bridge poll interval
  reconnectBase:  500,     // ms — WS reconnect base delay
  reconnectMax:   16000,
};

/* ── DOM refs ────────────────────────────────────────────────────────────── */
const pillAi         = document.getElementById('pill-ai');
const pillAiText     = document.getElementById('pill-ai-text');
const pillRoom       = document.getElementById('pill-room');
const pillRoomText   = document.getElementById('pill-room-text');
const pillStream     = document.getElementById('pill-stream');
const pillStreamText = document.getElementById('pill-stream-text');
const latencyChip    = document.getElementById('latency-chip');
const captionTray    = document.getElementById('caption-tray');
const glossRow       = document.getElementById('gloss-row');
const reconnBanner   = document.getElementById('reconnect-banner');

/* ── State ───────────────────────────────────────────────────────────────── */
let captionLines   = [];   // [{el, text}]
let captionTimer   = null;
let latencyHistory = [];
let ws             = null;
let wsDelay        = CFG.reconnectBase;
let wsRunning      = false;
let captionCount   = 0;

/* ── Pill helper ─────────────────────────────────────────────────────────── */
function setPill(el, textEl, cls, text) {
  el.className = `pill ${cls}`;
  textEl.textContent = text;
}

/* ── Latency chip ────────────────────────────────────────────────────────── */
function updateLatency(ms) {
  latencyHistory.push(ms);
  if (latencyHistory.length > 10) latencyHistory.shift();
  const avg = Math.round(latencyHistory.reduce((a, b) => a + b, 0) / latencyHistory.length);
  latencyChip.textContent = `${avg} ms`;
  // green < 200ms, yellow < 400ms, red >= 400ms
  latencyChip.className = 'latency-chip ' +
    (avg < 200 ? 'fast' : avg < 400 ? 'medium' : 'slow');
}

/* ── Teleprompter caption renderer ──────────────────────────────────────── */
function pushCaption(text, glosses) {
  clearTimeout(captionTimer);
  captionTray.classList.remove('idle');

  // Age all existing lines
  captionLines.forEach(({ el }, i) => {
    el.classList.remove('age-0', 'age-1', 'age-2');
    const age = captionLines.length - i;  // 1 = most recent existing
    if (age === 1) el.classList.add('age-1');
    else           el.classList.add('age-2');
  });

  // Evict oldest if at capacity
  if (captionLines.length >= CFG.maxLines) {
    const evict = captionLines.shift();
    evict.el.classList.add('exiting');
    setTimeout(() => evict.el.remove(), 320);
  }

  // New line
  const line = document.createElement('p');
  line.className   = 'caption-line age-0';
  line.textContent = text;
  captionTray.insertBefore(line, glossRow);
  captionLines.push({ el: line, text });
  captionCount++;

  renderGlosses(glosses);

  // Auto-clear after silence
  captionTimer = setTimeout(clearCaptions, CFG.captionTimeout);
}

function clearCaptions() {
  captionLines.forEach(({ el }) => {
    el.classList.add('exiting');
    setTimeout(() => el.remove(), 320);
  });
  captionLines = [];
  clearGlosses();
  captionTray.classList.add('idle');
}

function renderGlosses(glosses) {
  glossRow.innerHTML = '';
  const clean = (glosses || []).filter(g => g !== '<blank>' && g !== '<unk>');
  if (!clean.length) { glossRow.classList.add('empty'); return; }
  glossRow.classList.remove('empty');
  clean.forEach((g, i) => {
    const chip = document.createElement('span');
    chip.className = 'g-chip';
    chip.textContent = g;
    chip.style.animationDelay = `${i * 40}ms`;
    glossRow.appendChild(chip);
  });
}

function clearGlosses() {
  glossRow.innerHTML = '';
  glossRow.classList.add('empty');
}

/* ── WebSocket ───────────────────────────────────────────────────────────── */
function connectWs() {
  if (!wsRunning) return;
  setPill(pillStream, pillStreamText, 'connecting', 'Connecting...');
  reconnBanner.classList.remove('visible');

  ws = new WebSocket(CFG.wsUrl);

  ws.onopen = () => {
    wsDelay = CFG.reconnectBase;
    setPill(pillStream, pillStreamText, 'live', 'Stream Live');
    setPill(pillRoom,   pillRoomText,   'live', 'sign_room');
    reconnBanner.classList.remove('visible');
    console.log('[Receiver] WS connected');
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    if (msg.type === 'caption') {
      const { glosses, caption, latency_ms } = msg;
      if (caption) {
        pushCaption(caption, glosses || []);
        updateLatency(latency_ms ?? 0);
        console.debug(`[Receiver] #${captionCount}: "${caption}" | ${Math.round(latency_ms ?? 0)}ms`);
      }
    }
  };

  ws.onerror = () => {
    setPill(pillStream, pillStreamText, 'error', 'Error');
  };

  ws.onclose = () => {
    setPill(pillStream, pillStreamText, 'idle', 'Stream Off');
    if (wsRunning) {
      reconnBanner.classList.add('visible');
      setTimeout(() => {
        wsDelay = Math.min(wsDelay * 2, CFG.reconnectMax);
        connectWs();
      }, wsDelay);
    }
  };
}

/* ── AI Bridge heartbeat ─────────────────────────────────────────────────── */
async function pollAiBridge() {
  try {
    const r = await fetch(CFG.healthUrl, { signal: AbortSignal.timeout(3000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    if (data.engine_ready) {
      setPill(pillAi, pillAiText, 'live', 'AI Ready');
    } else {
      setPill(pillAi, pillAiText, 'error', 'AI Offline');
    }

    // Update latency chip tooltip from server-side p99
    const stats = data.latency_stats;
    if (stats && stats.count > 0) {
      latencyChip.title =
        `p50=${stats.p50_ms}ms  p95=${stats.p95_ms}ms  p99=${stats.p99_ms}ms` +
        (stats.sla_breach_pct > 0 ? `  SLA breach: ${stats.sla_breach_pct}%` : '');
    }
  } catch {
    setPill(pillAi, pillAiText, 'error', 'AI Offline');
  }
}

/* ── Boot ────────────────────────────────────────────────────────────────── */
wsRunning = true;
connectWs();
pollAiBridge();
setInterval(pollAiBridge, CFG.healthInterval);
</script>
</body>
</html>
