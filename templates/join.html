{% extends 'base.html' %}
{% block title %}Join Meeting — Aashay's Sign Lang{% endblock %}

{% block content %}
<h1 class="text-center mt-2 mb-4">Join Meeting</h1>
<form method="POST" action="/join">
    <div class="form-group">
        <input type="text" placeholder="Enter Room ID" class="form-control form-control-lg"
               id="roomID" name="roomID" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg mt-2">Join</button>
</form>
<div class="mt-3">
    <a href="/dashboard" class="text-white-50">Back to Dashboard</a>
</div>
{% endblock %}
